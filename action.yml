name: 'Setup foji'
description: 'Downloads or builds the foji package management tool'
author: 'hazayan'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  version:
    description: 'Version of foji to use (default: latest release, or "build" to compile from source)'
    required: false
    default: 'latest'

  github-token:
    description: 'GitHub token for downloading releases'
    required: false
    default: ${{ github.token }}

outputs:
  foji-path:
    description: 'Path to the foji binary'
    value: ${{ steps.setup.outputs.foji-path }}

  foji-version:
    description: 'Version of foji that was installed'
    value: ${{ steps.setup.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Setup foji
      id: setup
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        VERSION="${{ inputs.version }}"

        # If version is "build", compile from source
        if [[ "$VERSION" == "build" ]]; then
          echo "🔨 Building foji from source..."

          # Check if we're in the foji repo or need to clone
          if [[ ! -f "Cargo.toml" ]] || ! grep -q "name = \"foji\"" Cargo.toml 2>/dev/null; then
            echo "Not in foji repository, cannot build from source"
            exit 1
          fi

          # Install Rust if needed
          if ! command -v cargo &> /dev/null; then
            echo "Installing Rust..."
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source "$HOME/.cargo/env"
          fi

          # Build
          cargo build --release
          FOJI_PATH="$(pwd)/target/release/foji"
          VERSION="source"
        else
          # Determine version to download
          if [[ "$VERSION" == "latest" ]]; then
            echo "🔍 Finding latest foji release..."
            VERSION=$(gh release list --repo "${{ github.repository }}" --limit 1 | grep -v "repository" | head -1 | awk '{print $1}' || echo "")

            if [[ -z "$VERSION" ]]; then
              echo "⚠️  No foji release found, falling back to building from source"
              VERSION="build"
            fi
          fi

          # Download if we have a version
          if [[ "$VERSION" != "build" ]]; then
            echo "📦 Downloading foji $VERSION..."

            # Create directory for foji
            mkdir -p "$HOME/.local/bin"

            # Try to download the binary
            if gh release download "$VERSION" \
                --repo "${{ github.repository }}" \
                --pattern "foji-*-linux-x86_64" \
                --output "$HOME/.local/bin/foji" 2>/dev/null; then

              chmod +x "$HOME/.local/bin/foji"
              FOJI_PATH="$HOME/.local/bin/foji"
              echo "✅ Downloaded foji $VERSION"
            else
              echo "⚠️  Failed to download foji $VERSION, building from source instead"
              VERSION="build"
            fi
          fi

          # Fallback to building if download failed
          if [[ "$VERSION" == "build" ]]; then
            echo "🔨 Building foji from source as fallback..."

            if [[ ! -f "Cargo.toml" ]]; then
              echo "ERROR: Not in foji repository and cannot download binary"
              exit 1
            fi

            if ! command -v cargo &> /dev/null; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source "$HOME/.cargo/env"
            fi

            cargo build --release
            FOJI_PATH="$(pwd)/target/release/foji"
            VERSION="source"
          fi
        fi

        # Verify foji works
        if [[ -f "$FOJI_PATH" ]]; then
          echo "✅ foji ready at: $FOJI_PATH"
          "$FOJI_PATH" --version || echo "foji (version info not available)"

          # Add to PATH
          echo "$(dirname "$FOJI_PATH")" >> $GITHUB_PATH

          # Set outputs
          echo "foji-path=$FOJI_PATH" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        else
          echo "❌ Failed to set up foji"
          exit 1
        fi

    - name: Cache foji binary
      if: inputs.version == 'latest'
      uses: actions/cache@v3
      with:
        path: ~/.local/bin/foji
        key: foji-${{ steps.setup.outputs.version }}-${{ runner.os }}
