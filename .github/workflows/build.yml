name: Build and Update Repository (Rust)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "packages/**"
      - "build-container/**"
      - ".github/workflows/build.yml"
  repository_dispatch:
    types: [rebuild-all]

concurrency:
  group: package-repository-release
  cancel-in-progress: false

env:
  RELEASE_TAG: repo
  REPO_NAME: foji

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && (github.event.client_payload.sha || github.event.client_payload.ref) || github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libz-dev

      - name: Build foji from checked-out ref
        run: cargo build --release

      - name: Debug foji environment
        run: |
          echo "Git ref: ${GITHUB_REF}"
          echo "Git SHA: $(git rev-parse HEAD)"
          ./target/release/foji --help >/dev/null

      - name: List all packages (debug)
        shell: bash
        run: |
          echo "All packages in repository:"
          ./target/release/foji list-packages --verbose

      - name: List current packages (source of truth)
        id: current_pkgs
        shell: bash
        run: |
          # Get packages as newline-separated list and join into a single space-separated string
          mapfile -t pkgs < <(./target/release/foji list-packages)
          mapfile -t pkg_paths < <(./target/release/foji list-packages --paths)
          versions=()
          for pkg_path in "${pkg_paths[@]}"; do
            versions+=( "$(./target/release/foji package-version "${pkg_path}")" )
          done

          CURRENT="${pkgs[*]}"
          CURRENT_PATHS="${pkg_paths[*]}"
          CURRENT_VERSIONS="${versions[*]}"
          echo "Current packages: ${CURRENT}"
          echo "Current package paths: ${CURRENT_PATHS}"
          echo "Current package versions: ${CURRENT_VERSIONS}"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "current_paths=${CURRENT_PATHS}" >> "$GITHUB_OUTPUT"
          echo "current_versions=${CURRENT_VERSIONS}" >> "$GITHUB_OUTPUT"

    outputs:
      current_packages: ${{ steps.current_pkgs.outputs.current }}
      current_package_paths: ${{ steps.current_pkgs.outputs.current_paths }}
      current_package_versions: ${{ steps.current_pkgs.outputs.current_versions }}

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - preflight

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && (github.event.client_payload.sha || github.event.client_payload.ref) || github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create repository directory
        run: |
          mkdir -p repo/x86_64

      - name: Download existing release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Downloading existing packages from release..."

          # Check if release exists
          if gh release view ${{ env.RELEASE_TAG }} >/dev/null 2>&1; then
            echo "Release exists, downloading existing assets..."

            # Download all existing assets to preserve them
            cd repo/x86_64
            gh release download ${{ env.RELEASE_TAG }} --pattern "*.pkg.tar.zst*" || echo "No packages to download"
            gh release download ${{ env.RELEASE_TAG }} --pattern "foji.db*" || echo "No database to download"
            gh release download ${{ env.RELEASE_TAG }} --pattern "foji.files*" || echo "No files database to download"
            cd ../..

            echo "Downloaded existing assets:"
            ls -lh repo/x86_64/ || echo "Directory is empty"
          else
            echo "No existing release found, starting fresh"
          fi

      - name: Use current packages from preflight
        id: current_pkgs
        run: |
          CURRENT="${{ needs.preflight.outputs.current_packages }}"
          echo "Current packages (from preflight): ${CURRENT}"
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT

      - name: Prune packages that no longer exist
        working-directory: repo/x86_64
        run: |
          set -e

          CURRENT="${{ steps.current_pkgs.outputs.current }}"

          echo "Current package set from foji:"
          echo "${CURRENT}"

          # If there are no package files yet, nothing to prune
          shopt -s nullglob
          PKGFILES=( ./*.pkg.tar.* )
          if [ ${#PKGFILES[@]} -eq 0 ]; then
            echo "No existing package files to prune"
            exit 0
          fi

          # Convert CURRENT into a newline-separated list for easier matching
          # shellcheck disable=SC2086
          printf '%s\n' ${CURRENT} > /tmp/current-packages.txt

          prune_file() {
            local f="$1"
            local base="${f##*/}"        # strip path
            base="${base%%.pkg.tar.*}"   # strip extension
            # Strip arch (last -separated field), assuming name-ver-rel-arch.pkg.tar.*
            base="${base%-*-*-*}"
            echo "$base"
          }

          for f in ./*.pkg.tar.*; do
            [ -e "$f" ] || continue

            PKGNAME=$(prune_file "$f")

            if ! grep -qx "$PKGNAME" /tmp/current-packages.txt; then
              echo "Removing obsolete package file: $f (pkgname=$PKGNAME not in current packages)"
              rm -f "$f"
            else
              echo "Keeping package file: $f (pkgname=$PKGNAME is current)"
            fi
          done

      - name: Determine package build targets
        id: build_targets
        working-directory: repo/x86_64
        run: |
          set -e

          CURRENT="${{ steps.current_pkgs.outputs.current }}"
          CURRENT_PATHS="${{ needs.preflight.outputs.current_package_paths }}"
          CURRENT_VERSIONS="${{ needs.preflight.outputs.current_package_versions }}"

          declare -A targets=()

          read -r -a current_names <<< "${CURRENT}"
          read -r -a current_paths <<< "${CURRENT_PATHS}"
          read -r -a current_versions <<< "${CURRENT_VERSIONS}"

          shopt -s nullglob
          for i in "${!current_paths[@]}"; do
            pkg_path="${current_paths[$i]}"
            pkg_name="${current_names[$i]}"
            pkg_version="${current_versions[$i]}"
            found=false

            for pkg_file in ./*.pkg.tar.*; do
              if [[ "${pkg_file}" == *.sig ]]; then
                continue
              fi

              if [[ "${pkg_file##*/}" == "${pkg_name}-${pkg_version}-"*.pkg.tar.* ]]; then
                found=true
                break
              fi
            done

            if [ "${found}" = false ]; then
              echo "Current package ${pkg_name}-${pkg_version} is missing from release assets; scheduling build."
              targets["${pkg_path}"]=1
            fi
          done

          BUILD_TARGETS="${!targets[*]}"
          echo "Package paths to build: ${BUILD_TARGETS}"
          echo "packages=${BUILD_TARGETS}" >> "$GITHUB_OUTPUT"

      - name: Import GPG key
        run: |
          gpg --import --no-tty <<<"${{ secrets.GPG_KEY }}"
          gpg --import-ownertrust --no-tty <<<"${{ vars.GPG_KEY_ID }}:5:"

      - name: Build builder image
        run: |
          docker build -t package-builder build-container/

      - name: Build packages
        if: steps.build_targets.outputs.packages != ''
        run: |
          docker run --rm \
            --privileged \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e RELEASE_TAG="${{ env.RELEASE_TAG }}" \
            -e CHANGED_PACKAGES="${{ steps.build_targets.outputs.packages }}" \
            -e GPG_KEY_DATA="${{ secrets.GPG_KEY }}" \
            -e GPG_KEY_ID="${{ vars.GPG_KEY_ID }}" \
            -v ${{ github.workspace }}:/build \
            -v ${{ github.workspace }}/repo:/repo \
            package-builder

      - name: Rebuild and sign pacman database from current packages (in container)
        working-directory: repo/x86_64
        env:
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -e

          # At this point, repo/x86_64 contains:
          # - Any previously downloaded packages/DB from the release
          # - Newly built packages from the container
          # and has been pruned to the current package set.

          shopt -s nullglob
          PKGFILES=( ./*.pkg.tar.* )
          if [ ${#PKGFILES[@]} -eq 0 ]; then
            echo "No package files found; skipping container repo-add."
            exit 0
          fi

          echo "Rebuilding and signing pacman DB inside Arch container from the following packages:"
          ls -1 ./*.pkg.tar.*

          # Run a one-shot Arch-based container that has repo-add and GPG available.
          # We mount only repo/x86_64 and pass the key material into the container.
          docker run --rm \
            -e GPG_KEY_ID="${{ vars.GPG_KEY_ID }}" \
            -e GPG_KEY_DATA="${{ secrets.GPG_KEY }}" \
            -v "$PWD":/repo/x86_64 \
            archlinux:base \
            bash -lc '
              set -e

              pacman -Sy --noconfirm pacman-contrib gnupg
              mkdir -p ~/.gnupg
              chmod 700 ~/.gnupg
              echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
              gpgconf --kill gpg-agent
              gpg --batch --import --pinentry-mode loopback --no-tty <<<"${GPG_KEY_DATA}"
              echo "${GPG_KEY_ID}:5:" | gpg --batch --import-ownertrust

              cd /repo/x86_64

              # Remove existing DB files
              rm -f foji.db* foji.files* foji.db.tar.gz.lck || true

              shopt -s nullglob
              # Collect all package archives (exclude signatures)
              PKGFILES=( ./*.pkg.tar.* )
              PKGONLY=()
              for f in "${PKGFILES[@]}"; do
                # Skip signature files
                if [[ "$f" == *.sig ]]; then
                  continue
                fi
                PKGONLY+=( "$f" )
              done

              if [ ${#PKGONLY[@]} -eq 0 ]; then
                echo "No package files found; skipping repo-add in container."
                exit 0
              fi

              echo "Signing packages in container..."
              if [ -n "${GPG_KEY_ID-}" ]; then
                for pkg in "${PKGONLY[@]}"; do
                  if [ -f "${pkg}" ]; then
                    echo "Signing ${pkg}..."
                    gpg --detach-sign --batch --yes -u "${GPG_KEY_ID}" "${pkg}" || {
                      echo "Warning: failed to sign ${pkg}, continuing."
                    }
                  fi
                done
              else
                echo "GPG_KEY_ID is not set in container; skipping package signing."
              fi

              echo "Creating database (signed if key is available) in container..."
              if [ -n "${GPG_KEY_ID-}" ]; then
                repo-add -s -k "${GPG_KEY_ID}" -n -R foji.db.tar.gz "${PKGONLY[@]}" || {
                  echo "repo-add with signing failed; attempting unsigned..."
                  repo-add -n -R foji.db.tar.gz "${PKGONLY[@]}"
                }
              else
                repo-add -n -R foji.db.tar.gz "${PKGONLY[@]}"
              fi
            '

      - name: Create release notes
        run: |
          cat > release-notes.md <<'EOF'
          Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          Built packages in this update: ${{ steps.build_targets.outputs.packages }}

          ## Usage

          Add this repository to your `/etc/pacman.conf`:

          ```ini
          [foji]
          SigLevel = Optional TrustAll
          Server = https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}
          ```

          Then run:
          ```bash
          sudo pacman -Sy
          sudo pacman -S <package-name>
          ```
          EOF

      - name: Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "📤 Updating the single package repository release..."

          # Ensure the directory has at least one file (for diagnostics / debug)
          if [ ! "$(ls -A repo/x86_64)" ]; then
            echo "⚠️  No packages found, creating placeholder"
            echo "This directory is reserved for x86_64 packages" > "repo/x86_64/README.txt"
          fi

          # List what we're about to upload
          echo "Files to upload:"
          ls -lh repo/x86_64/

          # Determine what artifacts actually exist
          shopt -s nullglob

          PKGFILES=( repo/x86_64/*.pkg.tar.* )
          DBFILES=( repo/x86_64/foji.db* repo/x86_64/foji.files* )

          HAS_PKGS=false
          HAS_DB=false

          if [ ${#PKGFILES[@]} -gt 0 ]; then
            HAS_PKGS=true
          fi

          if [ ${#DBFILES[@]} -gt 0 ]; then
            HAS_DB=true
          fi

          if [ "$HAS_PKGS" = false ] && [ "$HAS_DB" = false ]; then
            echo "⚠️  No packages or database files found; skipping release update."
            exit 0
          fi

          if gh release view "${{ env.RELEASE_TAG }}" >/dev/null 2>&1; then
            echo "Release ${{ env.RELEASE_TAG }} exists; updating it in place."
            gh release edit "${{ env.RELEASE_TAG }}" \
              --title "Package Repository" \
              --notes-file release-notes.md
          else
            echo "Release ${{ env.RELEASE_TAG }} does not exist; creating it once."
            gh release create "${{ env.RELEASE_TAG }}" \
              --title "Package Repository" \
              --notes-file release-notes.md
          fi

          UPLOADS=()
          if [ "$HAS_PKGS" = true ]; then
            UPLOADS+=( repo/x86_64/*.pkg.tar.* )
          fi

          if [ "$HAS_DB" = true ]; then
            # Only include DB/files patterns that actually match
            for f in repo/x86_64/foji.db* repo/x86_64/foji.files*; do
              if [ -e "$f" ]; then
                UPLOADS+=( "$f" )
              fi
            done
          fi

          echo "Uploading current package repository assets..."
          gh release upload "${{ env.RELEASE_TAG }}" "${UPLOADS[@]}" --clobber

          printf '%s\n' "${UPLOADS[@]##*/}" > /tmp/current-release-assets.txt

          echo "Deleting obsolete package repository assets from release..."
          gh release view "${{ env.RELEASE_TAG }}" --json assets -q '.assets[].name' |
            while IFS= read -r asset; do
              case "$asset" in
                *.pkg.tar.*|foji.db*|foji.files*)
                  if ! grep -qxF "$asset" /tmp/current-release-assets.txt; then
                    echo "Deleting obsolete release asset: $asset"
                    gh release delete-asset "${{ env.RELEASE_TAG }}" "$asset" --yes
                  fi
                  ;;
              esac
            done

          echo "✅ Release updated successfully"
